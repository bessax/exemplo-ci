name: CI .NET

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v3

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: 📦 Restore (API)
      run: dotnet restore my-app-example-ci

    - name: 📦 Restore (Tests)
      run: dotnet restore my-app-exemplo-ci-tests

    - name: 🏗️ Build
      run: dotnet build --no-restore

    - name: 🧪 Testes
      run: dotnet test my-app-exemplo-ci-tests --no-build --verbosity normal