name: CI .NET

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v3

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'  # mais estável

    - name: 📦 Restore (API)
      run: dotnet restore my-app-example-ci/my-app-example-ci.csproj

    - name: 📦 Restore (Tests)
      run: dotnet restore my-app-exemplo-ci-tests/my-app-exemplo-ci-tests.csproj

    - name: 🏗️ Build (API)
      run: dotnet build my-app-example-ci/my-app-example-ci.csproj --no-restore --configuration Release

    - name: 🧪 Testes
      run: dotnet test my-app-exemplo-ci-tests/my-app-exemplo-ci-tests.csproj --no-build --verbosity normal